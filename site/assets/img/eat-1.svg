<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f6b3f"/>
      <stop offset="100%" stop-color="#0a4a2c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="640" fill="url(#sky)"/>
  <g fill="#ffffff" opacity="0.85">
    <circle cx="120" cy="80" r="3"/><circle cx="660" cy="60" r="2.4"/><circle cx="720" cy="120" r="2"/>
  </g>
  <g fill="#EF5113"><path d="M80 130 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/></g>

  <!-- rolling green -->
  <path d="M0 420 C 200 360 300 460 460 400 C 600 350 700 420 800 380 L800 640 L0 640 Z" fill="url(#green)"/>
  <path d="M0 460 C 220 420 320 490 500 440 C 640 400 720 450 800 430" fill="none" stroke="#0a4a2c" stroke-width="3" opacity="0.6"/>

  <!-- windmill -->
  <g transform="translate(600,300)">
    <rect x="-30" y="60" width="60" height="140" fill="#1a1a2e"/>
    <polygon points="-30,60 0,10 30,60" fill="#131431"/>
    <rect x="-6" y="0" width="12" height="12" fill="#EF5113"/>
    <g transform="translate(0,6)">
      <g fill="#EF5113">
        <rect x="-4" y="-70" width="8" height="70" rx="4" transform="rotate(0)"/>
        <rect x="-4" y="-70" width="8" height="70" rx="4" transform="rotate(90)"/>
        <rect x="-4" y="-70" width="8" height="70" rx="4" transform="rotate(180)"/>
        <rect x="-4" y="-70" width="8" height="70" rx="4" transform="rotate(270)"/>
      </g>
      <circle r="10" fill="#ffffff"/>
    </g>
    <rect x="-20" y="120" width="40" height="60" fill="#0e0e20"/>
    <rect x="-14" y="130" width="28" height="24" fill="#EF5113" opacity="0.6"/>
  </g>

  <!-- putting green with hole and flag -->
  <ellipse cx="280" cy="520" rx="90" ry="26" fill="#0a4a2c"/>
  <ellipse cx="280" cy="520" rx="14" ry="6" fill="#0e0e20"/>
  <rect x="277" y="440" width="4" height="82" fill="#cfd3e6"/>
  <path d="M281 440 L322 452 L281 464 Z" fill="#EF5113"/>

  <!-- golf ball -->
  <circle cx="200" cy="560" r="12" fill="#ffffff"/>
  <g fill="#cfd3e6"><circle cx="196" cy="556" r="1.3"/><circle cx="204" cy="558" r="1.3"/><circle cx="200" cy="564" r="1.3"/></g>

  <!-- putter -->
  <g transform="translate(150,470) rotate(20)">
    <rect x="-3" y="0" width="6" height="110" rx="3" fill="#cfd3e6"/>
    <rect x="-4" y="104" width="24" height="14" rx="3" fill="#c2410c"/>
  </g>

  <!-- obstacle: mini bridge -->
  <g transform="translate(460,470)">
    <rect x="-60" y="-8" width="120" height="16" rx="6" fill="#8a5a2a"/>
    <rect x="-60" y="-24" width="6" height="24" fill="#8a5a2a"/>
    <rect x="54" y="-24" width="6" height="24" fill="#8a5a2a"/>
  </g>
</svg>
