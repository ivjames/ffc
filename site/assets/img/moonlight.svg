<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131431"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff8e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#EF5113" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#EF5113" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#sky)"/>

  <circle cx="450" cy="90" r="80" fill="url(#moonGlow)"/>
  <circle cx="450" cy="90" r="32" fill="#fdf6e3"/>
  <circle cx="440" cy="80" r="6" fill="#e8dcb8" opacity="0.6"/>
  <circle cx="460" cy="98" r="4" fill="#e8dcb8" opacity="0.5"/>

  <g fill="#cfd3e6" opacity="0.8">
    <circle cx="60" cy="60" r="2"/><circle cx="140" cy="40" r="1.6"/><circle cx="230" cy="70" r="2"/>
    <circle cx="330" cy="35" r="1.6"/><circle cx="90" cy="120" r="1.4"/>
  </g>
  <g fill="#EF5113"><path d="M180 100 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/></g>

  <rect x="0" y="280" width="600" height="120" fill="url(#glow)"/>

  <!-- ferris wheel silhouette -->
  <g transform="translate(150,260)">
    <circle r="80" fill="none" stroke="#0e0e20" stroke-width="6"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#0e0e20" stroke-width="3"/>
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#0e0e20" stroke-width="3"/>
    <line x1="-56" y1="-56" x2="56" y2="56" stroke="#0e0e20" stroke-width="3"/>
    <line x1="-56" y1="56" x2="56" y2="-56" stroke="#0e0e20" stroke-width="3"/>
    <circle r="10" fill="#EF5113"/>
    <rect x="-12" y="80" width="24" height="60" fill="#0e0e20"/>
  </g>

  <!-- coaster hill silhouette -->
  <path d="M300 400 L300 260 C 340 220 380 300 420 260 C 450 230 470 260 500 240 L600 260 L600 400 Z" fill="#0e0e20"/>
  <path d="M300 260 C 340 220 380 300 420 260 C 450 230 470 260 500 240" fill="none" stroke="#EF5113" stroke-width="4" opacity="0.8"/>
</svg>
