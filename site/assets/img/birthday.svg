<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#131431"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g fill="#EF5113"><path d="M60 60 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/><path d="M540 90 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 z"/></g>

  <!-- confetti burst -->
  <g>
    <circle cx="120" cy="100" r="6" fill="#ffffff"/>
    <rect x="460" y="130" width="12" height="12" fill="#cfd3e6" transform="rotate(20 466 136)"/>
    <circle cx="480" cy="70" r="5" fill="#EF5113"/>
    <rect x="200" y="60" width="10" height="10" fill="#EF5113" transform="rotate(15 205 65)"/>
    <circle cx="380" cy="50" r="5" fill="#cfd3e6"/>
    <rect x="90" y="180" width="10" height="10" fill="#c2410c" transform="rotate(-10 95 185)"/>
  </g>

  <!-- three tier cake -->
  <g transform="translate(300,340)">
    <ellipse cx="0" cy="10" rx="130" ry="18" fill="#0e0e20"/>
    <rect x="-120" y="-40" width="240" height="50" rx="10" fill="#ffffff"/>
    <rect x="-120" y="-40" width="240" height="14" fill="#EF5113"/>
    <rect x="-90" y="-90" width="180" height="52" rx="10" fill="#cfd3e6"/>
    <rect x="-90" y="-90" width="180" height="14" fill="#c2410c"/>
    <rect x="-56" y="-140" width="112" height="52" rx="10" fill="#EF5113"/>
    <rect x="-56" y="-140" width="112" height="14" fill="#c2410c"/>

    <!-- candles -->
    <g fill="#ffffff">
      <rect x="-40" y="-172" width="7" height="34" rx="2"/>
      <rect x="-4" y="-180" width="7" height="42" rx="2"/>
      <rect x="32" y="-172" width="7" height="34" rx="2"/>
    </g>
    <g fill="#EF5113">
      <path d="M-36.5 -178 q4 -10 8 0z"/>
      <path d="M-0.5 -186 q4 -10 8 0z"/>
      <path d="M35.5 -178 q4 -10 8 0z"/>
    </g>
    <g fill="#ffffff" opacity="0.5">
      <circle cx="-32.5" cy="-182" r="6"/>
      <circle cx="3.5" cy="-190" r="6"/>
      <circle cx="39.5" cy="-182" r="6"/>
    </g>
  </g>
</svg>
