<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#131431"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g fill="#EF5113"><path d="M40 50 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/></g>
  <g fill="#cfd3e6" opacity="0.7"><circle cx="500" cy="60" r="2"/><circle cx="60" cy="150" r="1.6"/></g>

  <!-- balloons -->
  <g>
    <ellipse cx="180" cy="140" rx="46" ry="58" fill="#EF5113"/>
    <path d="M180 198 L180 220" stroke="#cfd3e6" stroke-width="2"/>
    <path d="M175 110 q6 -10 12 0" fill="none" stroke="#c2410c" stroke-width="3"/>
  </g>
  <g>
    <ellipse cx="280" cy="100" rx="40" ry="52" fill="#ffffff"/>
    <path d="M280 152 L280 220" stroke="#cfd3e6" stroke-width="2"/>
  </g>
  <g>
    <ellipse cx="370" cy="150" rx="42" ry="54" fill="#c2410c"/>
    <path d="M370 204 L370 220" stroke="#cfd3e6" stroke-width="2"/>
  </g>

  <!-- confetti -->
  <g>
    <circle cx="140" cy="80" r="6" fill="#ffffff"/>
    <rect x="430" y="90" width="12" height="12" fill="#cfd3e6" transform="rotate(20 436 96)"/>
    <circle cx="450" cy="150" r="5" fill="#EF5113"/>
    <rect x="220" y="40" width="10" height="10" fill="#EF5113" transform="rotate(15 225 45)"/>
    <circle cx="320" cy="50" r="5" fill="#cfd3e6"/>
  </g>

  <!-- cake -->
  <g transform="translate(300,300)">
    <rect x="-90" y="-10" width="180" height="60" rx="8" fill="#ffffff"/>
    <rect x="-90" y="-10" width="180" height="16" fill="#EF5113"/>
    <rect x="-70" y="-60" width="140" height="55" rx="8" fill="#c2410c"/>
    <rect x="-70" y="-60" width="140" height="14" fill="#EF5113"/>
    <g fill="#EF5113">
      <rect x="-40" y="-90" width="6" height="34"/>
      <rect x="-6" y="-96" width="6" height="40"/>
      <rect x="28" y="-90" width="6" height="34"/>
    </g>
    <g fill="#ffffff">
      <path d="M-40 -95 q3 -8 6 0z" fill="#EF5113"/>
      <circle cx="-37" cy="-98" r="4" fill="#EF5113"/>
      <circle cx="-3" cy="-104" r="4" fill="#EF5113"/>
      <circle cx="31" cy="-98" r="4" fill="#EF5113"/>
    </g>
  </g>

  <rect x="0" y="360" width="600" height="40" fill="#0e0e20"/>
