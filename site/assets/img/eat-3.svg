<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#131431"/>
    </linearGradient>
    <linearGradient id="crust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a45a"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="640" fill="url(#bg)"/>
  <g fill="#EF5113">
    <path d="M80 90 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
    <path d="M700 130 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 z"/>
  </g>
  <g fill="#cfd3e6" opacity="0.7"><circle cx="600" cy="70" r="2"/><circle cx="150" cy="60" r="1.8"/></g>

  <!-- table -->
  <ellipse cx="400" cy="520" rx="360" ry="90" fill="#0e0e20"/>

  <!-- pizza -->
  <g transform="translate(280,470)">
    <circle r="140" fill="url(#crust)"/>
    <circle r="118" fill="#EF5113"/>
    <g fill="#ffffff" opacity="0.9">
      <circle cx="-40" cy="-30" r="16"/>
      <circle cx="30" cy="-50" r="14"/>
      <circle cx="60" cy="20" r="15"/>
      <circle cx="-20" cy="50" r="13"/>
      <circle cx="-60" cy="10" r="12"/>
    </g>
    <g fill="#c2410c">
      <circle cx="-40" cy="-30" r="7"/>
      <circle cx="30" cy="-50" r="6"/>
      <circle cx="60" cy="20" r="7"/>
      <circle cx="-20" cy="50" r="6"/>
      <circle cx="-60" cy="10" r="5"/>
    </g>
    <path d="M0 0 L140 0" stroke="#c2410c" stroke-width="2" opacity="0.4"/>
    <path d="M0 0 L-100 96" stroke="#c2410c" stroke-width="2" opacity="0.4"/>
    <path d="M0 0 L-100 -96" stroke="#c2410c" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- soda cup -->
  <g transform="translate(560,380)">
    <path d="M-40 0 L40 0 L28 220 L-28 220 Z" fill="#ffffff"/>
    <path d="M-40 0 L40 0 L28 220 L-28 220 Z" fill="#EF5113" opacity="0.15"/>
    <rect x="-40" y="-14" width="80" height="20" rx="6" fill="#c2410c"/>
    <path d="M-2 -60 C -30 -50 -30 -20 -6 -14" stroke="#cfd3e6" stroke-width="8" fill="none" stroke-linecap="round"/>
    <text x="0" y="90" font-family="Arial Black, Arial, sans-serif" font-size="26" fill="#EF5113" text-anchor="middle" font-weight="900" opacity="0.001">FUN</text>
    <g fill="#EF5113"><rect x="-24" y="40" width="48" height="10" rx="4"/><rect x="-24" y="60" width="48" height="10" rx="4"/></g>
  </g>

  <!-- straw -->
  <line x1="-2" y1="-60" x2="10" y2="-140" stroke="#cfd3e6" stroke-width="10" stroke-linecap="round" transform="translate(560,380)"/>

  <!-- plates in bg -->
  <g fill="#cfd3e6" opacity="0.5">
    <ellipse cx="150" cy="560" rx="70" ry="20"/>
    <ellipse cx="680" cy="560" rx="60" ry="18"/>
  </g>
</svg>
