  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g fill="#EF5113"><path d="M60 60 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/><path d="M540 300 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/></g>
  <g fill="#cfd3e6" opacity="0.7"><circle cx="500" cy="70" r="2"/><circle cx="80" cy="320" r="1.8"/></g>

  <g transform="translate(300,200) rotate(-6)">
