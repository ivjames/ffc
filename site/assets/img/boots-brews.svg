<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131431"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- string lights -->
  <path d="M0 60 Q150 110 300 60 T600 60" fill="none" stroke="#3a3a5c" stroke-width="3"/>
  <g fill="#EF5113">
    <circle cx="40" cy="72" r="7"/><circle cx="130" cy="98" r="7"/><circle cx="220" cy="80" r="7"/>
    <circle cx="310" cy="64" r="7"/><circle cx="400" cy="82" r="7"/><circle cx="490" cy="96" r="7"/><circle cx="570" cy="72" r="7"/>
  </g>
  <g fill="#ffffff" opacity="0.6">
    <circle cx="40" cy="72" r="12" opacity="0.15"/><circle cx="310" cy="64" r="12" opacity="0.15"/><circle cx="570" cy="72" r="12" opacity="0.15"/>
  </g>
  <g fill="#cfd3e6" opacity="0.7"><circle cx="530" cy="30" r="2"/><circle cx="80" cy="30" r="1.6"/></g>

  <!-- ground -->
  <rect x="0" y="330" width="600" height="70" fill="#0e0e20"/>

  <!-- cowboy boots pair -->
  <g transform="translate(240,280)">
    <path d="M0 100 L0 20 C 0 0 20 -10 40 -10 L70 -10 C 80 -10 84 0 84 10 L84 40 L110 60 L110 100 Z" fill="#c2410c"/>
    <path d="M0 100 L0 20 C 0 0 20 -10 40 -10 L70 -10 C 80 -10 84 0 84 10 L84 40 L110 60 L110 100 Z" fill="none" stroke="#EF5113" stroke-width="3"/>
    <rect x="-6" y="94" width="122" height="16" rx="4" fill="#131431"/>
    <path d="M20 0 Q40 20 60 0" stroke="#EF5113" stroke-width="3" fill="none"/>
    <circle cx="40" cy="30" r="10" fill="#EF5113" opacity="0.5"/>
  </g>
  <g transform="translate(360,280)">
    <path d="M0 100 L0 20 C 0 0 20 -10 40 -10 L70 -10 C 80 -10 84 0 84 10 L84 40 L110 60 L110 100 Z" fill="#EF5113"/>
    <path d="M0 100 L0 20 C 0 0 20 -10 40 -10 L70 -10 C 80 -10 84 0 84 10 L84 40 L110 60 L110 100 Z" fill="none" stroke="#c2410c" stroke-width="3"/>
    <rect x="-6" y="94" width="122" height="16" rx="4" fill="#131431"/>
    <path d="M20 0 Q40 20 60 0" stroke="#c2410c" stroke-width="3" fill="none"/>
    <circle cx="40" cy="30" r="10" fill="#c2410c" opacity="0.5"/>
  </g>

  <!-- mug -->
  <g transform="translate(120,300)">
    <rect x="0" y="0" width="60" height="70" rx="6" fill="#cfd3e6"/>
    <rect x="0" y="0" width="60" height="16" fill="#ffffff" opacity="0.8"/>
    <path d="M60 12 C 90 12 90 50 60 50" fill="none" stroke="#cfd3e6" stroke-width="8"/>
  </g>
</svg>
