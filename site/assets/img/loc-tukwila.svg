<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131431"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="dark-overlay" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a16" stop-opacity="0.78"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- stars/sparks -->
  <g fill="#cfd3e6" opacity="0.7">
    <circle cx="90" cy="60" r="2"/><circle cx="700" cy="55" r="1.8"/><circle cx="640" cy="100" r="1.5"/>
  </g>
  <g fill="#EF5113"><path d="M120 100 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 z"/></g>

  <!-- overhead glow strips -->
  <g fill="#EF5113" opacity="0.5">
    <rect x="60" y="30" width="120" height="8" rx="4"/>
    <rect x="300" y="30" width="120" height="8" rx="4"/>
    <rect x="540" y="30" width="120" height="8" rx="4"/>
  </g>

  <!-- bowling lane in perspective -->
  <polygon points="330,140 470,140 650,600 150,600" fill="url(#lane)"/>
  <!-- lane boards -->
  <g stroke="#2a1a10" stroke-width="2" opacity="0.5">
    <line x1="360" y1="140" x2="230" y2="600"/>
    <line x1="400" y1="140" x2="400" y2="600"/>
    <line x1="440" y1="140" x2="570" y2="600"/>
  </g>
  <!-- gutters -->
  <polygon points="300,140 330,140 150,600 90,600" fill="#0e0e20"/>
  <polygon points="470,140 500,140 710,600 650,600" fill="#0e0e20"/>

  <!-- arrows on lane -->
  <g fill="#cfd3e6" opacity="0.8">
    <path d="M400 380 l-10 20 20 0 z"/>
    <path d="M370 400 l-8 16 16 0 z"/>
    <path d="M430 400 l-8 16 16 0 z"/>
  </g>

  <!-- pins -->
  <g fill="#ffffff">
    <g transform="translate(400,175)"><ellipse cx="0" cy="20" rx="7" ry="18"/><circle cx="0" cy="4" r="6"/></g>
    <g transform="translate(385,195)"><ellipse cx="0" cy="20" rx="7" ry="18"/><circle cx="0" cy="4" r="6"/></g>
    <g transform="translate(415,195)"><ellipse cx="0" cy="20" rx="7" ry="18"/><circle cx="0" cy="4" r="6"/></g>
    <g transform="translate(370,216)"><ellipse cx="0" cy="20" rx="7" ry="18"/><circle cx="0" cy="4" r="6"/></g>
    <g transform="translate(400,216)"><ellipse cx="0" cy="20" rx="7" ry="18"/><circle cx="0" cy="4" r="6"/></g>
    <g transform="translate(430,216)"><ellipse cx="0" cy="20" rx="7" ry="18"/><circle cx="0" cy="4" r="6"/></g>
  </g>
  <g fill="#EF5113" opacity="0.85">
    <rect x="393" y="188" width="14" height="6"/>
    <rect x="378" y="208" width="14" height="6"/>
    <rect x="408" y="208" width="14" height="6"/>
    <rect x="363" y="230" width="14" height="6"/>
    <rect x="393" y="230" width="14" height="6"/>
    <rect x="423" y="230" width="14" height="6"/>
  </g>

  <!-- bowling ball -->
  <g transform="translate(400,470)">
    <circle r="42" fill="url(#lane)" opacity="0.001"/>
    <circle r="42" fill="#EF5113"/>
    <circle r="42" fill="none" stroke="#c2410c" stroke-width="4"/>
    <circle cx="-10" cy="-16" r="4" fill="#131431"/>
    <circle cx="8" cy="-18" r="4" fill="#131431"/>
    <circle cx="-2" cy="-4" r="4" fill="#131431"/>
  </g>

  <rect width="800" height="600" fill="url(#dark-overlay)"/>
</svg>
