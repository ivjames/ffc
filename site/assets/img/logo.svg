<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131431"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="antlerGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#EF5113"/>
    </linearGradient>
  </defs>
  <rect width="440" height="240" fill="url(#bgGrad)"/>

  <!-- sparks -->
  <g fill="#EF5113">
    <path d="M40 40 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z"/>
    <path d="M404 60 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 z"/>
  </g>
  <g fill="#cfd3e6" opacity="0.8">
    <circle cx="70" cy="90" r="2"/>
    <circle cx="378" cy="100" r="2.2"/>
    <circle cx="26" cy="140" r="1.6"/>
  </g>

  <!-- antler / star motif -->
  <g transform="translate(220,52)">
    <path d="M0 -18 L0 18" stroke="url(#antlerGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- left antler -->
    <path d="M0 6 C -18 0 -26 -14 -22 -30 C -30 -24 -40 -26 -46 -34 M-22 -30 C -28 -18 -40 -16 -46 -22" fill="none" stroke="url(#antlerGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- right antler -->
    <path d="M0 6 C 18 0 26 -14 22 -30 C 30 -24 40 -26 46 -34 M22 -30 C 28 -18 40 -16 46 -22" fill="none" stroke="url(#antlerGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="10" r="6" fill="#EF5113"/>
  </g>

  <!-- Wordmark with drop shadow -->
  <g font-family="Arial Black, Arial, sans-serif" font-weight="900" text-anchor="middle" letter-spacing="-1">
    <text x="223" y="146" font-size="52" fill="#c2410c">BULLWINKLE'S</text>
    <text x="220" y="143" font-size="52" fill="#ffffff">BULLWINKLE'S</text>
  </g>

  <!-- underline flourish -->
  <rect x="90" y="160" width="260" height="4" rx="2" fill="#EF5113"/>

  <!-- subline -->
  <text x="220" y="196" font-family="Arial, sans-serif" font-weight="700" font-size="22" letter-spacing="4" fill="#EF5113" text-anchor="middle">FAMILY FUN CENTER</text>

  <!-- small stars flanking subline -->
  <g fill="#cfd3e6">
    <path d="M70 190 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2 z"/>
    <path d="M370 190 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2 z"/>
  </g>
</svg>
