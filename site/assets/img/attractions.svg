<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#131431"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g fill="#EF5113"><path d="M40 40 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/><path d="M560 60 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 z"/></g>
  <g fill="#cfd3e6" opacity="0.7"><circle cx="300" cy="30" r="2"/><circle cx="500" cy="40" r="1.6"/></g>

  <!-- ferris wheel left -->
  <g transform="translate(140,220)">
    <circle r="95" fill="none" stroke="#EF5113" stroke-width="6"/>
    <line x1="-95" y1="0" x2="95" y2="0" stroke="#EF5113" stroke-width="3"/>
    <line x1="0" y1="-95" x2="0" y2="95" stroke="#EF5113" stroke-width="3"/>
    <line x1="-67" y1="-67" x2="67" y2="67" stroke="#EF5113" stroke-width="3"/>
    <line x1="-67" y1="67" x2="67" y2="-67" stroke="#EF5113" stroke-width="3"/>
    <circle r="12" fill="#EF5113"/>
    <g fill="#cfd3e6"><circle cx="95" cy="0" r="7"/><circle cx="-95" cy="0" r="7"/><circle cx="0" cy="95" r="7"/><circle cx="0" cy="-95" r="7"/></g>
    <rect x="-14" y="95" width="28" height="90" fill="#0e0e20"/>
  </g>

  <!-- go-kart center -->
  <g transform="translate(320,280)">
    <ellipse cx="0" cy="40" rx="70" ry="14" fill="#0e0e20"/>
    <rect x="-46" y="-6" width="92" height="30" rx="10" fill="#c2410c"/>
    <circle cx="-40" cy="24" r="16" fill="#131431"/>
    <circle cx="40" cy="24" r="16" fill="#131431"/>
    <circle cx="-40" cy="24" r="6" fill="#cfd3e6"/>
    <circle cx="40" cy="24" r="6" fill="#cfd3e6"/>
    <circle cx="0" cy="-22" r="16" fill="#ffffff"/>
  </g>

  <!-- mini golf flag right -->
  <g transform="translate(480,230)">
    <ellipse cx="0" cy="90" rx="46" ry="12" fill="#0e0e20"/>
    <rect x="-3" y="-10" width="6" height="100" fill="#cfd3e6"/>
    <path d="M3 -10 L44 4 L3 18 Z" fill="#EF5113"/>
  </g>

  <!-- arcade building far right -->
  <g transform="translate(540,250)">
    <rect x="-30" y="0" width="60" height="70" fill="#0e0e20"/>
    <rect x="-20" y="14" width="14" height="18" fill="#EF5113" opacity="0.8"/>
    <rect x="6" y="14" width="14" height="18" fill="#EF5113" opacity="0.6"/>
  </g>

  <!-- ground -->
  <rect x="0" y="340" width="600" height="60" fill="#0e0e20"/>
</svg>
