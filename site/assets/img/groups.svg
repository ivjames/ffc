<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c2410c"/>
      <stop offset="55%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#131431"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.8"><circle cx="80" cy="50" r="2.4"/><circle cx="500" cy="60" r="2"/></g>

  <rect x="0" y="350" width="600" height="50" fill="#0e0e20"/>

  <!-- group silhouettes in a row, varied heights, two high-fiving -->
  <g fill="#131431">
    <g transform="translate(110,350)">
      <circle cx="0" cy="-150" r="24" fill="#cfd3e6"/>
      <path d="M-20 -128 C -20 -60 -20 -10 -20 0 L20 0 C 20 -10 20 -60 20 -128 Z" fill="#cfd3e6"/>
    </g>
    <!-- high five pair -->
    <g transform="translate(230,350)">
      <circle cx="0" cy="-170" r="26" fill="#ffffff"/>
      <path d="M-22 -146 C -22 -70 -22 -10 -22 0 L22 0 C 22 -10 22 -70 22 -146 Z" fill="#ffffff"/>
      <path d="M20 -140 L60 -190" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    </g>
    <g transform="translate(330,350)">
      <circle cx="0" cy="-180" r="28" fill="#EF5113"/>
      <path d="M-24 -154 C -24 -70 -24 -10 -24 0 L24 0 C 24 -10 24 -70 24 -154 Z" fill="#EF5113"/>
      <path d="M-20 -148 L-60 -198" stroke="#EF5113" stroke-width="15" stroke-linecap="round"/>
    </g>
    <circle cx="290" cy="152" r="8" fill="#ffffff" transform="translate(0,0)"/>
    <g transform="translate(430,350)">
      <circle cx="0" cy="-155" r="24" fill="#cfd3e6"/>
      <path d="M-20 -132 C -20 -60 -20 -10 -20 0 L20 0 C 20 -10 20 -60 20 -132 Z" fill="#cfd3e6"/>
    </g>
    <g transform="translate(510,350)">
      <circle cx="0" cy="-140" r="22" fill="#c2410c"/>
      <path d="M-18 -118 C -18 -55 -18 -10 -18 0 L18 0 C 18 -10 18 -55 18 -118 Z" fill="#c2410c"/>
    </g>
  </g>

  <!-- spark burst near high five point -->
  <g fill="#ffffff">
    <path d="M290 158 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/>
  </g>
</svg>
