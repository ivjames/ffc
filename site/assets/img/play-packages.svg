<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#131431"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF5113"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g fill="#EF5113"><path d="M60 60 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/><path d="M540 70 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 z"/></g>
  <g fill="#cfd3e6" opacity="0.7"><circle cx="300" cy="40" r="2"/><circle cx="470" cy="120" r="1.6"/></g>

  <!-- wristband loop -->
  <g transform="translate(300,180)">
    <path d="M-120 40 C -120 -40 120 -40 120 40 C 120 100 60 120 0 120 C -60 120 -120 100 -120 40 Z" fill="url(#band)"/>
    <path d="M-120 40 C -120 -40 120 -40 120 40" fill="none" stroke="#1a1a2e" stroke-width="4" opacity="0.3"/>
    <rect x="-30" y="10" width="60" height="60" rx="10" fill="#ffffff"/>
    <g fill="#EF5113">
      <path d="M0 22 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
    </g>
  </g>

  <!-- tickets -->
  <g transform="translate(150,290) rotate(-8)">
    <rect x="0" y="0" width="130" height="60" rx="8" fill="#ffffff"/>
    <circle cx="0" cy="30" r="10" fill="#131431"/>
    <circle cx="130" cy="30" r="10" fill="#131431"/>
    <line x1="30" y1="8" x2="30" y2="52" stroke="#EF5113" stroke-width="3" stroke-dasharray="5 5"/>
    <g fill="#EF5113"><rect x="46" y="18" width="60" height="8" rx="3"/><rect x="46" y="34" width="40" height="8" rx="3"/></g>
  </g>

  <g transform="translate(400,300) rotate(6)">
    <rect x="0" y="0" width="130" height="60" rx="8" fill="#cfd3e6"/>
    <circle cx="0" cy="30" r="10" fill="#131431"/>
    <circle cx="130" cy="30" r="10" fill="#131431"/>
    <line x1="30" y1="8" x2="30" y2="52" stroke="#c2410c" stroke-width="3" stroke-dasharray="5 5"/>
    <g fill="#c2410c"><rect x="46" y="18" width="60" height="8" rx="3"/><rect x="46" y="34" width="40" height="8" rx="3"/></g>
  </g>

  <rect x="0" y="360" width="600" height="40" fill="#0e0e20"/>
</svg>
