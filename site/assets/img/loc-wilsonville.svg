<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131431"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a44"/>
      <stop offset="100%" stop-color="#0e0e20"/>
    </linearGradient>
    <linearGradient id="kartOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF5113"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="dark-overlay" cx="50%" cy="60%" r="75%">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a16" stop-opacity="0.75"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#cfd3e6" opacity="0.7">
    <circle cx="70" cy="60" r="2"/><circle cx="180" cy="40" r="1.6"/><circle cx="640" cy="50" r="2"/>
    <circle cx="720" cy="90" r="1.6"/><circle cx="420" cy="35" r="1.8"/>
  </g>
  <g fill="#EF5113"><path d="M600 30 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 z"/></g>

  <!-- track -->
  <path d="M-20 420 C 220 320 300 480 420 400 C 560 310 660 420 820 360 L820 620 L-20 620 Z" fill="url(#track)"/>
  <path d="M-20 420 C 220 320 300 480 420 400 C 560 310 660 420 820 360" fill="none" stroke="#EF5113" stroke-width="8" stroke-dasharray="30 22" opacity="0.75"/>
  <path d="M-20 470 C 220 380 300 520 420 450 C 560 370 660 470 820 410" fill="none" stroke="#3a3a5c" stroke-width="4"/>

  <!-- barrier posts -->
  <g fill="#cfd3e6" opacity="0.6">
    <rect x="150" y="360" width="6" height="26"/>
    <rect x="330" y="440" width="6" height="26"/>
    <rect x="520" y="360" width="6" height="26"/>
    <rect x="700" y="390" width="6" height="26"/>
  </g>

  <!-- go-kart 1 -->
  <g transform="translate(300,430)">
    <ellipse cx="0" cy="52" rx="70" ry="14" fill="#0a0a16" opacity="0.5"/>
    <rect x="-46" y="0" width="92" height="30" rx="10" fill="url(#kartOrange)"/>
    <circle cx="-40" cy="34" r="16" fill="#131431"/>
    <circle cx="40" cy="34" r="16" fill="#131431"/>
    <circle cx="-40" cy="34" r="6" fill="#cfd3e6"/>
    <circle cx="40" cy="34" r="6" fill="#cfd3e6"/>
    <circle cx="0" cy="-14" r="16" fill="#ffffff"/>
    <rect x="-10" y="-30" width="20" height="16" rx="6" fill="#c2410c"/>
  </g>

  <!-- go-kart 2 further -->
  <g transform="translate(560,340) scale(0.75)">
    <ellipse cx="0" cy="52" rx="70" ry="14" fill="#0a0a16" opacity="0.4"/>
    <rect x="-46" y="0" width="92" height="30" rx="10" fill="#c2410c"/>
    <circle cx="-40" cy="34" r="16" fill="#131431"/>
    <circle cx="40" cy="34" r="16" fill="#131431"/>
    <circle cx="0" cy="-14" r="16" fill="#cfd3e6"/>
  </g>

  <!-- checkered flag -->
  <g transform="translate(150,300)">
    <rect x="-3" y="-10" width="6" height="120" fill="#cfd3e6"/>
    <g>
      <rect x="3" y="-10" width="12" height="12" fill="#ffffff"/>
      <rect x="15" y="-10" width="12" height="12" fill="#131431"/>
      <rect x="3" y="2" width="12" height="12" fill="#131431"/>
      <rect x="15" y="2" width="12" height="12" fill="#ffffff"/>
      <rect x="3" y="14" width="12" height="12" fill="#ffffff"/>
      <rect x="15" y="14" width="12" height="12" fill="#131431"/>
    </g>
  </g>

  <rect width="800" height="600" fill="url(#dark-overlay)"/>
</svg>
