<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#131431"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#ground)"/>

  <!-- green zone: mini golf -->
  <rect x="20" y="20" width="180" height="150" rx="14" fill="#0a4a2c"/>
  <path d="M50 150 C 70 100 60 70 90 60 C 120 50 130 90 160 80" fill="none" stroke="#0f6b3f" stroke-width="10" stroke-linecap="round"/>
  <circle cx="50" cy="150" r="6" fill="#EF5113"/>
  <rect x="88" y="30" width="3" height="34" fill="#cfd3e6"/>
  <path d="M91 30 L112 38 L91 46 Z" fill="#EF5113"/>

  <!-- go-kart track zone -->
  <rect x="220" y="20" width="360" height="160" rx="14" fill="#0e0e20"/>
  <path d="M250 150 C 320 60 420 60 480 110 C 520 140 500 170 450 160 C 400 150 380 100 330 110 C 290 118 280 140 250 150 Z" fill="none" stroke="#EF5113" stroke-width="10" stroke-dasharray="16 10"/>
  <path d="M250 150 C 320 60 420 60 480 110 C 520 140 500 170 450 160 C 400 150 380 100 330 110 C 290 118 280 140 250 150 Z" fill="none" stroke="#3a3a5c" stroke-width="2"/>

  <!-- arcade building zone -->
  <rect x="20" y="190" width="160" height="120" rx="10" fill="#c2410c"/>
  <g fill="#EF5113" opacity="0.7">
    <rect x="40" y="215" width="20" height="24"/>
    <rect x="75" y="215" width="20" height="24"/>
    <rect x="110" y="215" width="20" height="24"/>
    <rect x="145" y="215" width="20" height="24"/>
  </g>

  <!-- bowling building zone -->
  <rect x="200" y="200" width="150" height="110" rx="10" fill="#EF5113"/>
  <g fill="#131431" opacity="0.6">
    <rect x="220" y="220" width="30" height="70" rx="6"/>
    <rect x="258" y="220" width="30" height="70" rx="6"/>
    <rect x="296" y="220" width="30" height="70" rx="6"/>
  </g>

  <!-- party pavilion zone -->
  <rect x="370" y="200" width="210" height="110" rx="10" fill="#cfd3e6"/>
  <g fill="#c2410c">
    <circle cx="410" cy="240" r="14"/>
    <circle cx="450" cy="230" r="14"/>
    <circle cx="490" cy="245" r="14"/>
  </g>
  <rect x="400" y="270" width="140" height="26" rx="6" fill="#EF5113"/>

  <!-- paths connecting zones -->
  <g stroke="#3a3a5c" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M200 95 L220 95"/>
    <path d="M100 170 L100 190"/>
    <path d="M180 250 L200 250"/>
    <path d="M350 255 L370 255"/>
    <path d="M400 180 L400 200"/>
  </g>
  <g stroke="#EF5113" stroke-width="3" stroke-dasharray="6 6" fill="none" opacity="0.6">
    <path d="M200 95 L220 95"/>
    <path d="M100 170 L100 190"/>
    <path d="M180 250 L200 250"/>
    <path d="M350 255 L370 255"/>
    <path d="M400 180 L400 200"/>
  </g>

  <!-- compass / star accent -->
  <g transform="translate(555,40)" fill="#EF5113">
    <path d="M0 -22 L6 -6 L22 0 L6 6 L0 22 L-6 6 L-22 0 L-6 -6 Z"/>
  </g>
  <g fill="#cfd3e6" opacity="0.7"><circle cx="530" cy="20" r="2"/></g>
</svg>
