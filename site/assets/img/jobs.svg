<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#131431"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g fill="#EF5113"><path d="M60 60 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z"/><path d="M540 80 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 z"/></g>
  <g fill="#cfd3e6" opacity="0.7"><circle cx="300" cy="40" r="2"/></g>

  <!-- smiling staff silhouette -->
  <g transform="translate(300,230)">
    <circle cx="0" cy="-70" r="52" fill="#cfd3e6"/>
    <path d="M-140 140 C -140 20 -80 -20 0 -20 C 80 -20 140 20 140 140 Z" fill="#c2410c"/>
    <path d="M-140 140 C -140 20 -80 -20 0 -20 C 80 -20 140 20 140 140 Z" fill="#EF5113" opacity="0.35"/>
    <!-- smile -->
    <path d="M-22 -60 Q0 -40 22 -60" stroke="#131431" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="-20" cy="-80" r="5" fill="#131431"/>
    <circle cx="20" cy="-80" r="5" fill="#131431"/>
  </g>

  <!-- name badge -->
  <g transform="translate(300,255)">
    <rect x="-60" y="0" width="120" height="80" rx="10" fill="#ffffff"/>
    <circle cx="0" cy="-4" r="8" fill="#cfd3e6"/>
    <rect x="-40" y="16" width="80" height="10" rx="4" fill="#EF5113"/>
    <rect x="-30" y="34" width="60" height="8" rx="4" fill="#c2410c" opacity="0.6"/>
    <rect x="-20" y="50" width="40" height="8" rx="4" fill="#c2410c" opacity="0.6"/>
  </g>

  <rect x="0" y="360" width="600" height="40" fill="#0e0e20"/>
</svg>
