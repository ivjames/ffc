<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#2f2f2f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Mini Golf Scorecard</title>
    <!-- Apply the saved light/dark theme before first paint to avoid a flash of
         the wrong mode. The app (src/lib/mode.ts) takes over from here. -->
    <script>
      (function () {
        var m;
        try {
          m = localStorage.getItem('ffc-theme');
        } catch (e) {
          m = null;
        }
        if (m !== 'light' && m !== 'dark') {
          // No explicit choice yet — follow the OS preference.
          m =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        }
        document.documentElement.dataset.theme = m;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
